<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaveAds Player</title>

  <!-- Google Analytics GA4 — replace G-XXXXXXXXXX with your Measurement ID -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #player-container {
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    /* YouTube iframe fills the full screen */
    #yt-player {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Invisible overlay — prevents taps from triggering YouTube controls */
    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      background: transparent;
    }

    /* Business name watermark */
    #business-label {
      position: fixed;
      bottom: 18px;
      left: 22px;
      color: rgba(255,255,255,0.7);
      font-family: Arial, sans-serif;
      font-size: 13px;
      letter-spacing: 0.5px;
      z-index: 8;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="player-container">
    <div id="yt-player"></div>
  </div>
  <div id="business-label"></div>
  <div id="overlay"></div>

  <script>
    // ─────────────────────────────────────────────
    // PLAYLIST — 4 pilot businesses
    // YouTube video IDs extracted from the shared links
    // ─────────────────────────────────────────────
    const playlist = [
      { name: "Kono's North Shore", videoId: "wjkzNEv0mU4" },
      { name: "The Surfing Pig",    videoId: "dKrpINkS1Bk" },
      { name: "Paia",               videoId: "gb4rtlev-_k" },
      { name: "La Plena",           videoId: "KHCs3LXWJXY" }
    ];

    // ─────────────────────────────────────────────
    // TABLET ID — persistent per device
    // ─────────────────────────────────────────────
    function getTabletId() {
      let id = localStorage.getItem('waveads_tablet_id');
      if (!id) {
        id = 'tablet_' + Math.random().toString(36).substr(2, 8).toUpperCase();
        localStorage.setItem('waveads_tablet_id', id);
      }
      return id;
    }

    // ─────────────────────────────────────────────
    // YOUTUBE PLAYER
    // ─────────────────────────────────────────────
    let player;
    let currentIndex = 0;
    const label = document.getElementById('business-label');

    // Called automatically by YouTube IFrame API when ready
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('yt-player', {
        videoId: playlist[0].videoId,
        playerVars: {
          autoplay: 1,       // autoplay on load
          mute: 1,           // muted = autoplay works in all browsers
          controls: 0,       // no controls visible
          disablekb: 1,      // disable keyboard shortcuts
          fs: 0,             // no fullscreen button
          iv_load_policy: 3, // no annotations
          modestbranding: 1, // minimal YouTube branding
          rel: 0,            // no related videos at end
          loop: 0,           // we handle looping ourselves
          playsinline: 1     // play inline on iOS/Android
        },
        events: {
          onReady: onPlayerReady,
          onStateChange: onPlayerStateChange
        }
      });
    }

    function onPlayerReady(event) {
      label.textContent = playlist[0].name;

      // GA4: first video start
      gtag('event', 'video_start', {
        business_name: playlist[0].name,
        video_index: 1,
        tablet_id: getTabletId()
      });

      event.target.playVideo();
    }

    function onPlayerStateChange(event) {
      // YT.PlayerState.ENDED = 0
      if (event.data === YT.PlayerState.ENDED) {
        const item = playlist[currentIndex];

        // GA4: video complete
        gtag('event', 'video_complete', {
          business_name: item.name,
          video_index: currentIndex + 1,
          tablet_id: getTabletId()
        });

        // Advance to next video
        currentIndex = (currentIndex + 1) % playlist.length;
        const next = playlist[currentIndex];

        label.textContent = next.name;
        player.loadVideoById(next.videoId);

        // GA4: next video start
        gtag('event', 'video_start', {
          business_name: next.name,
          video_index: currentIndex + 1,
          tablet_id: getTabletId()
        });
      }
    }
  </script>

</body>
</html>
