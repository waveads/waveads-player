<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaveAds Player</title>

  <!-- Google Analytics GA4 — replace G-XXXXXXXXXX with your Measurement ID -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #player {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
      background: #000;
    }

    /* Invisible overlay — prevents taps from triggering browser UI */
    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      background: transparent;
    }

    /* Business name watermark */
    #business-label {
      position: fixed;
      bottom: 18px;
      left: 22px;
      color: rgba(255,255,255,0.6);
      font-family: Arial, sans-serif;
      font-size: 13px;
      letter-spacing: 0.5px;
      z-index: 8;
      pointer-events: none;
    }

    /* Loading indicator */
    #loading-bar {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      width: 0%;
      background: #2EC4B6;
      z-index: 20;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>

  <div id="loading-bar"></div>
  <video id="player" autoplay muted playsinline></video>
  <div id="business-label"></div>
  <div id="overlay"></div>

  <script>
    // ─────────────────────────────────────────────
    // PLAYLIST — 4 pilot businesses
    // ─────────────────────────────────────────────
    const playlist = [
      {
        name: "Kono's North Shore",
        fileId: "1r8jn4BYEk2FZdXX4_Y7iAXRbXsVyHiMm"
      },
      {
        name: "The Surfing Pig",
        fileId: "1SRBc5v4JyWBuHxClVC-Q30NTzEp1OLmH"
      },
      {
        name: "Paia",
        fileId: "1LTfIoBcIE-rdFUkXQLoj78tQa7BJSiTK"
      },
      {
        name: "La Plena",
        fileId: "1ZzuQ9z9fW-wcok4nb1KvPjDxXxJsGDdA"
      }
    ];

    // ─────────────────────────────────────────────
    // TABLET ID — persistent per device
    // ─────────────────────────────────────────────
    function getTabletId() {
      let id = localStorage.getItem('waveads_tablet_id');
      if (!id) {
        id = 'tablet_' + Math.random().toString(36).substr(2, 8).toUpperCase();
        localStorage.setItem('waveads_tablet_id', id);
      }
      return id;
    }

    // ─────────────────────────────────────────────
    // PLAYER LOGIC
    // ─────────────────────────────────────────────
    const video       = document.getElementById('player');
    const label       = document.getElementById('business-label');
    const loadingBar  = document.getElementById('loading-bar');
    let currentIndex  = 0;
    let currentBlobUrl = null;

    // Build the direct streaming URL for a Google Drive file
    function driveUrl(fileId) {
      return `https://drive.usercontent.google.com/download?id=${fileId}&export=download`;
    }

    // Fetch video as blob to bypass Content-Disposition: attachment restriction
    async function loadVideo(index) {
      const item = playlist[index];
      label.textContent = item.name;

      // Show loading bar
      loadingBar.style.width = '30%';

      try {
        const response = await fetch(driveUrl(item.fileId));
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        loadingBar.style.width = '70%';
        const blob = await response.blob();
        loadingBar.style.width = '100%';

        // Revoke previous blob URL to free memory
        if (currentBlobUrl) {
          URL.revokeObjectURL(currentBlobUrl);
        }

        currentBlobUrl = URL.createObjectURL(blob);
        video.src = currentBlobUrl;
        video.load();

        setTimeout(() => { loadingBar.style.width = '0%'; }, 400);

        const playPromise = video.play();
        if (playPromise !== undefined) {
          playPromise.catch(() => {
            // Autoplay blocked — wait for first interaction
            document.addEventListener('click',      () => video.play(), { once: true });
            document.addEventListener('touchstart', () => video.play(), { once: true });
          });
        }

        // GA4: video_start
        gtag('event', 'video_start', {
          business_name: item.name,
          video_index: index + 1,
          tablet_id: getTabletId()
        });

      } catch (err) {
        console.error('Failed to load video:', err);
        loadingBar.style.width = '0%';
        // Skip to next on error
        setTimeout(() => {
          currentIndex = (currentIndex + 1) % playlist.length;
          loadVideo(currentIndex);
        }, 3000);
      }
    }

    // When video ends → GA4 → load next
    video.addEventListener('ended', () => {
      const item = playlist[currentIndex];
      gtag('event', 'video_complete', {
        business_name: item.name,
        video_index: currentIndex + 1,
        tablet_id: getTabletId()
      });
      currentIndex = (currentIndex + 1) % playlist.length;
      loadVideo(currentIndex);
    });

    // On video error → skip to next
    video.addEventListener('error', () => {
      const item = playlist[currentIndex];
      gtag('event', 'video_error', {
        business_name: item.name,
        error_code: video.error ? video.error.code : 'unknown',
        tablet_id: getTabletId()
      });
      setTimeout(() => {
        currentIndex = (currentIndex + 1) % playlist.length;
        loadVideo(currentIndex);
      }, 3000);
    });

    // ─────────────────────────────────────────────
    // START
    // ─────────────────────────────────────────────
    loadVideo(0);
  </script>

</body>
</html>
