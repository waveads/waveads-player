<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaveAds Player</title>

  <!-- Google Analytics GA4 — replace G-XXXXXXXXXX with your Measurement ID -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #player {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
      background: #000;
    }

    /* Invisible overlay — prevents any tap from triggering browser UI */
    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      background: transparent;
    }

    /* Business name watermark */
    #business-label {
      position: fixed;
      bottom: 18px;
      left: 22px;
      color: rgba(255,255,255,0.6);
      font-family: Arial, sans-serif;
      font-size: 13px;
      letter-spacing: 0.5px;
      z-index: 8;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <video id="player" autoplay muted playsinline preload="auto"></video>
  <div id="business-label"></div>
  <div id="overlay"></div>

  <script>
    // ─────────────────────────────────────────────
    // PLAYLIST — 4 pilot businesses
    // Direct streaming URLs via drive.usercontent.google.com
    // ─────────────────────────────────────────────
    const playlist = [
      {
        name: "Kono's North Shore",
        url: "https://drive.usercontent.google.com/download?id=1r8jn4BYEk2FZdXX4_Y7iAXRbXsVyHiMm&export=download"
      },
      {
        name: "The Surfing Pig",
        url: "https://drive.usercontent.google.com/download?id=1SRBc5v4JyWBuHxClVC-Q30NTzEp1OLmH&export=download"
      },
      {
        name: "Paia",
        url: "https://drive.usercontent.google.com/download?id=1LTfIoBcIE-rdFUkXQLoj78tQa7BJSiTK&export=download"
      },
      {
        name: "La Plena",
        url: "https://drive.usercontent.google.com/download?id=1ZzuQ9z9fW-wcok4nb1KvPjDxXxJsGDdA&export=download"
      }
    ];

    // ─────────────────────────────────────────────
    // TABLET ID — persistent per device
    // ─────────────────────────────────────────────
    function getTabletId() {
      let id = localStorage.getItem('waveads_tablet_id');
      if (!id) {
        id = 'tablet_' + Math.random().toString(36).substr(2, 8).toUpperCase();
        localStorage.setItem('waveads_tablet_id', id);
      }
      return id;
    }

    // ─────────────────────────────────────────────
    // PLAYER LOGIC
    // ─────────────────────────────────────────────
    const video = document.getElementById('player');
    const label = document.getElementById('business-label');
    let currentIndex = 0;

    function loadVideo(index) {
      const item = playlist[index];
      label.textContent = item.name;
      video.src = item.url;
      video.load();

      const playPromise = video.play();
      if (playPromise !== undefined) {
        playPromise.catch(() => {
          // Autoplay blocked — wait for first tap
          document.addEventListener('click',      () => video.play(), { once: true });
          document.addEventListener('touchstart', () => video.play(), { once: true });
        });
      }

      // GA4: video_start
      gtag('event', 'video_start', {
        business_name: item.name,
        video_index: index + 1,
        tablet_id: getTabletId()
      });
    }

    // When a video ends → fire GA4 → load next video
    video.addEventListener('ended', () => {
      const item = playlist[currentIndex];

      gtag('event', 'video_complete', {
        business_name: item.name,
        video_index: currentIndex + 1,
        tablet_id: getTabletId()
      });

      currentIndex = (currentIndex + 1) % playlist.length;
      loadVideo(currentIndex);
    });

    // On error → skip to next video after 3 seconds
    video.addEventListener('error', () => {
      const item = playlist[currentIndex];
      gtag('event', 'video_error', {
        business_name: item.name,
        error_code: video.error ? video.error.code : 'unknown',
        tablet_id: getTabletId()
      });
      setTimeout(() => {
        currentIndex = (currentIndex + 1) % playlist.length;
        loadVideo(currentIndex);
      }, 3000);
    });

    // ─────────────────────────────────────────────
    // START
    // ─────────────────────────────────────────────
    loadVideo(0);
  </script>

</body>
</html>
