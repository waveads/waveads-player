<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaveAds Player</title>

  <!-- Google Analytics GA4 — replace G-XXXXXXXXXX with your Measurement ID -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #player-frame {
      width: 100vw;
      height: 100vh;
      border: none;
      display: block;
    }

    /* Loading screen shown between videos */
    #loading {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }

    #loading img {
      width: 180px;
      opacity: 0.7;
    }

    /* Invisible overlay — prevents any tap from triggering browser UI */
    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      background: transparent;
    }

    /* Business name watermark (bottom-left) */
    #business-label {
      position: fixed;
      bottom: 18px;
      left: 22px;
      color: rgba(255,255,255,0.55);
      font-family: Arial, sans-serif;
      font-size: 13px;
      letter-spacing: 0.5px;
      z-index: 8;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Loading splash -->
  <div id="loading">
    <svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
      <text x="10" y="45" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#2EC4B6">WaveAds</text>
    </svg>
  </div>

  <!-- Google Drive iframe player -->
  <iframe id="player-frame" allowfullscreen allow="autoplay"></iframe>

  <!-- Business name watermark -->
  <div id="business-label"></div>

  <!-- Touch blocker -->
  <div id="overlay"></div>

  <script>
    // ─────────────────────────────────────────────
    // PLAYLIST — 4 pilot businesses
    // Google Drive preview embed URLs
    // Format: https://drive.google.com/file/d/FILE_ID/preview
    // ─────────────────────────────────────────────
    const playlist = [
      {
        name: "Kono's North Shore",
        fileId: "1r8jn4BYEk2FZdXX4_Y7iAXRbXsVyHiMm",
        duration: 30   // seconds — adjust to match actual video length
      },
      {
        name: "The Surfing Pig",
        fileId: "1SRBc5v4JyWBuHxClVC-Q30NTzEp1OLmH",
        duration: 30
      },
      {
        name: "Paia",
        fileId: "1LTfIoBcIE-rdFUkXQLoj78tQa7BJSiTK",
        duration: 30
      },
      {
        name: "La Plena",
        fileId: "1ZzuQ9z9fW-wcok4nb1KvPjDxXxJsGDdA",
        duration: 30
      }
    ];

    // ─────────────────────────────────────────────
    // TABLET ID — persistent per device
    // ─────────────────────────────────────────────
    function getTabletId() {
      let id = localStorage.getItem('waveads_tablet_id');
      if (!id) {
        id = 'tablet_' + Math.random().toString(36).substr(2, 8).toUpperCase();
        localStorage.setItem('waveads_tablet_id', id);
      }
      return id;
    }

    // ─────────────────────────────────────────────
    // PLAYER LOGIC
    // ─────────────────────────────────────────────
    const frame      = document.getElementById('player-frame');
    const loading    = document.getElementById('loading');
    const label      = document.getElementById('business-label');
    let currentIndex = 0;
    let timer        = null;

    function loadVideo(index) {
      const item = playlist[index];

      // Show loading briefly
      loading.style.display = 'flex';

      // Build Google Drive preview embed URL
      // ?rm=minimal hides the Drive toolbar; autoplay=1 starts playback
      const embedUrl = `https://drive.google.com/file/d/${item.fileId}/preview?rm=minimal`;

      frame.src = embedUrl;
      label.textContent = item.name;

      // Hide loading after 1.5 s (iframe starts rendering)
      setTimeout(() => { loading.style.display = 'none'; }, 1500);

      // Fire GA4 video_start
      gtag('event', 'video_start', {
        business_name: item.name,
        video_index: index + 1,
        tablet_id: getTabletId()
      });

      // Schedule advance to next video after duration
      clearTimeout(timer);
      timer = setTimeout(() => advanceVideo(index), item.duration * 1000);
    }

    function advanceVideo(completedIndex) {
      const item = playlist[completedIndex];

      // Fire GA4 video_complete
      gtag('event', 'video_complete', {
        business_name: item.name,
        video_index: completedIndex + 1,
        tablet_id: getTabletId()
      });

      // Move to next
      currentIndex = (completedIndex + 1) % playlist.length;
      loadVideo(currentIndex);
    }

    // ─────────────────────────────────────────────
    // START
    // ─────────────────────────────────────────────
    loadVideo(0);
  </script>

</body>
</html>
