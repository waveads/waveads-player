<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaveAds Player</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3RV187JM56"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-3RV187JM56');
  </script>

  <script src="https://www.youtube.com/iframe_api"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    .yt-wrap {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      transition: opacity 0.4s ease;
    }

    .yt-wrap iframe { width: 100%; height: 100%; border: none; }

    #wrap-a { z-index: 1; opacity: 1; }
    #wrap-b { z-index: 2; opacity: 0; }

    /* overlay blocks YouTube UI but allows clicks to pass through to our buttons */
    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      background: transparent;
      pointer-events: none;
    }

    #sound-btn {
      position: fixed;
      bottom: 14px;
      right: 18px;
      z-index: 50;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      width: 42px;
      height: 42px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    #sound-btn:hover { background: rgba(0,0,0,0.75); }
    #sound-btn svg { width: 22px; height: 22px; fill: white; }

    /* ── Consent screen ── */
    #consent-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #000;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      font-family: sans-serif;
    }
    #consent-screen.hidden {
      display: none;
    }
    #consent-logo {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }
    #consent-tagline {
      font-size: 18px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 48px;
      max-width: 480px;
      line-height: 1.6;
    }
    #consent-btn {
      background: #ff6b35;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 18px 52px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      font-family: sans-serif;
    }
    #consent-skip {
      margin-top: 24px;
      font-size: 14px;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Consent screen — shown first, and after every screensaver -->
  <div id="consent-screen">
    <div id="consent-logo">🌊 WaveAds</div>
    <p id="consent-tagline">
      Discover secret local restaurants,<br>
      activities & exclusive deals in Hawaii!
    </p>
    <button id="consent-btn" onclick="startFromConsent()">
      Show me local deals 🤙
    </button>
    <div id="consent-skip" onclick="startFromConsent()">No thanks, skip</div>
  </div>

  <!-- Player A -->
  <div id="wrap-a" class="yt-wrap">
    <div id="player-a"></div>
  </div>

  <!-- Player B -->
  <div id="wrap-b" class="yt-wrap">
    <div id="player-b"></div>
  </div>

  <!-- Sound toggle -->
  <button id="sound-btn" title="Toggle sound" onclick="toggleSound()">
    <svg id="icon-muted" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
    <svg id="icon-sound" viewBox="0 0 24 24" style="display:none"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
  </button>

  <div id="overlay"></div>

  <script>
    const playlist = [
      { name: "Kono's North Shore", videoId: "wjkzNEv0mU4" },
      { name: "The Surfing Pig",    videoId: "dKrpINkS1Bk" },
      { name: "Paia",               videoId: "gb4rtlev-_k" },
      { name: "San Paolo",          videoId: "YjvhcwYjyXc" },
      { name: "Tropical Tribe",     videoId: "fkNLQzezxEs" },
      { name: "La Plena",           videoId: "KHCs3LXWJXY" }
    ];

    function getTabletId() {
      let id = localStorage.getItem('waveads_tablet_id');
      if (!id) {
        id = 'tablet_' + Math.random().toString(36).substr(2, 8).toUpperCase();
        localStorage.setItem('waveads_tablet_id', id);
      }
      return id;
    }

    const YT_VARS = {
      autoplay: 1,
  mute: 1,
  controls: 0,
  disablekb: 1,
  fs: 0,
  iv_load_policy: 3,
  modestbranding: 1,
  rel: 0,
  loop: 0,
  playsinline: 1,
  cc_load_policy: 0,
  cc_lang_pref: 'none'    //
    };

    let playerA, playerB;
    let activePlayer = 'a';
    let currentIndex = 0;
    let isMuted = true;
    let readyCount = 0;
    let screensaverActive = false;

    // ── Fully Kiosk: registra eventos de screensaver ──
    // chamado assim que os players estão prontos
    function setupFullyKioskEvents() {
      if (typeof fully === 'undefined') return;
      fully.bind('onScreensaverStart', 'onScreensaverStart();');
      fully.bind('onScreensaverStop',  'onScreensaverStop();');
    }

    function onScreensaverStart() {
      screensaverActive = true;
      const active = activePlayer === 'a' ? playerA : playerB;
      if (active) active.pauseVideo();
      gtag('event', 'screensaver_start', { tablet_id: getTabletId() });
    }

    function onScreensaverStop() {
      screensaverActive = false;
      // mostra consent de novo para o próximo passageiro
      document.getElementById('consent-screen').classList.remove('hidden');
      gtag('event', 'screensaver_stop', { tablet_id: getTabletId() });
    }

    // ── Consent: passageiro clicou ──
    function startFromConsent() {
      document.getElementById('consent-screen').classList.add('hidden');
      gtag('event', 'consent_given', { tablet_id: getTabletId() });

      // retoma o player que estava pausado
      const active = activePlayer === 'a' ? playerA : playerB;
      if (active) {
        active.playVideo();
        applyMute(active);
      }
    }

    // ── Sound toggle ──
    function toggleSound() {
      const active = activePlayer === 'a' ? playerA : playerB;
      if (!active) return;
      if (isMuted) {
        active.unMute(); active.setVolume(100);
        document.getElementById('icon-muted').style.display = 'none';
        document.getElementById('icon-sound').style.display = 'block';
      } else {
        active.mute();
        document.getElementById('icon-muted').style.display = 'block';
        document.getElementById('icon-sound').style.display = 'none';
      }
      isMuted = !isMuted;
    }

    function applyMute(p) {
      if (isMuted) { p.mute(); }
      else { p.unMute(); p.setVolume(100); }
    }

    // ── Crossfade ──
    function crossfade() {
      const wrapA = document.getElementById('wrap-a');
      const wrapB = document.getElementById('wrap-b');
      if (activePlayer === 'a') {
        wrapB.style.opacity = '1';
        setTimeout(() => {
          wrapA.style.opacity = '0';
          wrapA.style.zIndex = '1';
          wrapB.style.zIndex = '2';
          activePlayer = 'b';
          preloadNext();
        }, 450);
      } else {
        wrapA.style.opacity = '1';
        setTimeout(() => {
          wrapB.style.opacity = '0';
          wrapB.style.zIndex = '1';
          wrapA.style.zIndex = '2';
          activePlayer = 'a';
          preloadNext();
        }, 450);
      }
    }

    function preloadNext() {
      const nextIndex = (currentIndex + 1) % playlist.length;
      const hidden = activePlayer === 'a' ? playerB : playerA;
      hidden.cueVideoById(playlist[nextIndex].videoId);
    }

    // ── Video ended ──
    function onVideoEnded() {
      if (screensaverActive) return;

      const item = playlist[currentIndex];
      gtag('event', 'video_complete', {
        business_name: item.name,
        video_index: currentIndex + 1,
        tablet_id: getTabletId()
      });

      currentIndex = (currentIndex + 1) % playlist.length;
      const next = playlist[currentIndex];
      const hidden = activePlayer === 'a' ? playerB : playerA;
      hidden.playVideo();
      applyMute(hidden);
      crossfade();

      gtag('event', 'video_start', {
        business_name: next.name,
        video_index: currentIndex + 1,
        tablet_id: getTabletId()
      });
    }

    // ── YouTube API ──
    function onYouTubeIframeAPIReady() {
      playerA = new YT.Player('player-a', {
        videoId: playlist[0].videoId,
        playerVars: YT_VARS,
        events: {
          onReady: onReadyA,
          onStateChange: (e) => {
            if (e.data === YT.PlayerState.ENDED && activePlayer === 'a') onVideoEnded();
          }
        }
      });
      playerB = new YT.Player('player-b', {
        videoId: playlist[1].videoId,
        playerVars: { ...YT_VARS, autoplay: 0 },
        events: {
          onReady: onReadyB,
          onStateChange: (e) => {
            if (e.data === YT.PlayerState.ENDED && activePlayer === 'b') onVideoEnded();
          }
        }
      });
    }

    function onReadyA(event) { readyCount++; if (readyCount === 2) startPlayback(); }
    function onReadyB(event) { readyCount++; if (readyCount === 2) startPlayback(); }

    // IGUAL AO ORIGINAL — não mudou nada aqui
    function startPlayback() {
      setupFullyKioskEvents();
      playerA.playVideo();
      applyMute(playerA);
      gtag('event', 'video_start', {
        business_name: playlist[0].name,
        video_index: 1,
        tablet_id: getTabletId()
      });
    }
  </script>

</body>
</html>
