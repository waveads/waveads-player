<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaveAds Player</title>

  <!-- Google Analytics GA4 — replace G-XXXXXXXXXX with your Measurement ID -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #player-container {
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    #yt-player {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Invisible overlay — blocks YouTube UI interactions */
    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      background: transparent;
    }

    /* Business name — bottom left */
    #business-label {
      position: fixed;
      bottom: 18px;
      left: 22px;
      color: rgba(255,255,255,0.7);
      font-family: Arial, sans-serif;
      font-size: 13px;
      letter-spacing: 0.5px;
      z-index: 20;
      pointer-events: none;
    }

    /* Sound toggle button — bottom right */
    #sound-btn {
      position: fixed;
      bottom: 14px;
      right: 18px;
      z-index: 20;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      width: 42px;
      height: 42px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    #sound-btn:hover {
      background: rgba(0,0,0,0.75);
    }

    #sound-btn svg {
      width: 22px;
      height: 22px;
      fill: white;
    }
  </style>
</head>
<body>

  <div id="player-container">
    <div id="yt-player"></div>
  </div>

  <div id="business-label"></div>

  <!-- Sound toggle button -->
  <button id="sound-btn" title="Toggle sound" onclick="toggleSound()">
    <!-- Muted icon (shown by default) -->
    <svg id="icon-muted" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
    </svg>
    <!-- Sound on icon (hidden by default) -->
    <svg id="icon-sound" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
  </button>

  <!-- Overlay on top of YouTube (below sound button) -->
  <div id="overlay"></div>

  <script>
    // ─────────────────────────────────────────────
    // PLAYLIST
    // ─────────────────────────────────────────────
    const playlist = [
      { name: "Kono's North Shore", videoId: "wjkzNEv0mU4" },
      { name: "The Surfing Pig",    videoId: "dKrpINkS1Bk" },
      { name: "Paia",               videoId: "gb4rtlev-_k" },
      { name: "La Plena",           videoId: "KHCs3LXWJXY" }
    ];

    // ─────────────────────────────────────────────
    // TABLET ID
    // ─────────────────────────────────────────────
    function getTabletId() {
      let id = localStorage.getItem('waveads_tablet_id');
      if (!id) {
        id = 'tablet_' + Math.random().toString(36).substr(2, 8).toUpperCase();
        localStorage.setItem('waveads_tablet_id', id);
      }
      return id;
    }

    // ─────────────────────────────────────────────
    // SOUND TOGGLE
    // ─────────────────────────────────────────────
    let isMuted = true;

    function toggleSound() {
      if (!player) return;
      if (isMuted) {
        player.unMute();
        player.setVolume(100);
        document.getElementById('icon-muted').style.display = 'none';
        document.getElementById('icon-sound').style.display = 'block';
      } else {
        player.mute();
        document.getElementById('icon-muted').style.display = 'block';
        document.getElementById('icon-sound').style.display = 'none';
      }
      isMuted = !isMuted;
    }

    // ─────────────────────────────────────────────
    // YOUTUBE PLAYER
    // ─────────────────────────────────────────────
    let player;
    let currentIndex = 0;
    const label = document.getElementById('business-label');

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('yt-player', {
        videoId: playlist[0].videoId,
        playerVars: {
          autoplay: 1,
          mute: 1,           // starts muted so autoplay works
          controls: 0,
          disablekb: 1,
          fs: 0,
          iv_load_policy: 3,
          modestbranding: 1,
          rel: 0,
          loop: 0,
          playsinline: 1
        },
        events: {
          onReady: onPlayerReady,
          onStateChange: onPlayerStateChange
        }
      });
    }

    function onPlayerReady(event) {
      label.textContent = playlist[0].name;
      gtag('event', 'video_start', {
        business_name: playlist[0].name,
        video_index: 1,
        tablet_id: getTabletId()
      });
      event.target.playVideo();
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.ENDED) {
        const item = playlist[currentIndex];
        gtag('event', 'video_complete', {
          business_name: item.name,
          video_index: currentIndex + 1,
          tablet_id: getTabletId()
        });

        currentIndex = (currentIndex + 1) % playlist.length;
        const next = playlist[currentIndex];
        label.textContent = next.name;
        player.loadVideoById(next.videoId);

        // Keep same mute state when advancing
        if (isMuted) {
          player.mute();
        } else {
          player.unMute();
          player.setVolume(100);
        }

        gtag('event', 'video_start', {
          business_name: next.name,
          video_index: currentIndex + 1,
          tablet_id: getTabletId()
        });
      }
    }
  </script>

</body>
</html>
